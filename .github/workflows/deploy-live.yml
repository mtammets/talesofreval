name: Deploy live

on:
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LIVE_HOST: talesofreval.ee
      LIVE_PORT: '22'
      LIVE_USER: virt72693

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix site/frontend

      - name: Build frontend
        run: CI=false npm run build --prefix site/frontend

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Write SSH key
        env:
          PREVIEW_SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${PREVIEW_SSH_KEY:?Missing PREVIEW_SSH_KEY secret}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PREVIEW_SSH_KEY" > ~/.ssh/live_deploy_key
          chmod 600 ~/.ssh/live_deploy_key

      - name: Validate SSH private key
        run: ssh-keygen -y -f ~/.ssh/live_deploy_key > /dev/null

      - name: Prepare SSH known_hosts
        run: |
          set -euo pipefail

          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/live_deploy_key \
            -p "$LIVE_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${LIVE_USER}@${LIVE_HOST}" \
            'echo "Connected to live server."'

      - name: Sync live files
        run: |
          set -euo pipefail

          REMOTE_PATH="/data01/${LIVE_USER}/domeenid/www.talesofreval.ee/tor-full-stack"

          rsync -az --delete \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='node_modules/' \
            --exclude='frontend/node_modules/' \
            --exclude='backend/uploads/' \
            --exclude='uploads/' \
            -e "ssh -i ~/.ssh/live_deploy_key -p ${LIVE_PORT} -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts" \
            site/ "${LIVE_USER}@${LIVE_HOST}:${REMOTE_PATH}/"

      - name: Reload live app
        run: |
          set -euo pipefail

          REMOTE_PATH="/data01/${LIVE_USER}/domeenid/www.talesofreval.ee/tor-full-stack"

          ssh \
            -i ~/.ssh/live_deploy_key \
            -p "$LIVE_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${LIVE_USER}@${LIVE_HOST}" <<EOF
            set -e
            cd "$REMOTE_PATH"
            npm install --omit=dev
            node backend/scripts/syncRuntimeSiteSettings.js
            pm2 reload tor-full --update-env
          EOF
