name: Deploy preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PREVIEW_HOST: talesofreval.ee
      PREVIEW_PORT: '22'
      PREVIEW_USER: virt72693
      EXPECTED_PREVIEW_PUBLIC_KEY: ssh-rsa 

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix site/frontend

      - name: Build frontend
        run: CI=false npm run build --prefix site/frontend

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Write SSH key
        env:
          PREVIEW_SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${PREVIEW_SSH_KEY:?Missing PREVIEW_SSH_KEY secret}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PREVIEW_SSH_KEY" > ~/.ssh/preview_deploy_key
          chmod 600 ~/.ssh/preview_deploy_key

      - name: Validate SSH private key
        run: ssh-keygen -y -f ~/.ssh/preview_deploy_key > /dev/null

      - name: Verify deploy key matches Zone key
        run: |
          set -euo pipefail

          actual_public_key="$(ssh-keygen -y -f ~/.ssh/preview_deploy_key)"
          if [ "$actual_public_key" != "$EXPECTED_PREVIEW_PUBLIC_KEY" ]; then
            echo "PREVIEW_SSH_KEY does not match the public key added in Zone."
            echo "Update the GitHub PREVIEW_SSH_KEY secret with ~/.ssh/tales_preview_github_actions_rsa."
            exit 1
          fi

      - name: Add preview host key
        run: |
          set -euo pipefail

          ssh-keyscan -p "$PREVIEW_PORT" "$PREVIEW_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/preview_deploy_key -p "$PREVIEW_PORT" "${PREVIEW_USER}@${PREVIEW_HOST}" 'echo "Connected to preview server."'

      - name: Sync preview files
        run: |
          set -euo pipefail

          REMOTE_PATH="/data01/${PREVIEW_USER}/domeenid/www.talesofreval.ee/tor-preview"

          rsync -az --delete \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='node_modules/' \
            --exclude='frontend/node_modules/' \
            --exclude='backend/uploads/' \
            --exclude='uploads/' \
            -e "ssh -i ~/.ssh/preview_deploy_key -p ${PREVIEW_PORT}" \
            site/ "${PREVIEW_USER}@${PREVIEW_HOST}:${REMOTE_PATH}/"

      - name: Reload preview app
        run: |
          set -euo pipefail

          REMOTE_PATH="/data01/${PREVIEW_USER}/domeenid/www.talesofreval.ee/tor-preview"

          ssh -i ~/.ssh/preview_deploy_key -p "$PREVIEW_PORT" "${PREVIEW_USER}@${PREVIEW_HOST}" <<EOF
            set -e
            cd "$REMOTE_PATH"
            npm install --omit=dev
            pm2 reload tales-preview --update-env
          EOF
